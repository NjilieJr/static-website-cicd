<!DOCTYPE html>
<html>
<head>
    <title>Static Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: #16213e;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,150,255,0.3);
        }
        h1 { color: #00d4ff; }
        p { color: #a8a8b3; }
        .badge {
            background: #00d4ff;
            color: #1a1a2e;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Static Website</h1>
        <p>Déployé via Pipeline CI/CD Jenkins</p>
        <p>Par <strong>NJILIE GBAYIE JUNIOR</strong></p>
        <div class="badge">✅ Production Ready</div>
    </div>
</body>
</html>
